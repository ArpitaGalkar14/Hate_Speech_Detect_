<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hate Speech Detection</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #0d0d0d, #1a1a1a 70%);
        margin: 0;
        color: white;
        overflow-x: hidden;
    }

    /* Header section */
    .hero {
        height: 280px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    .hero h1 {
        font-size: 50px;
        max-width: 600px;
        line-height: 1.4;
        background: linear-gradient(45deg, #00aaff, #14c3ff, #ffffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow:
            1px 1px 0px rgba(255,255,255,1),
            2px 2px 0px rgba(240,240,240,0.9),
            3px 3px 0px rgba(220,220,220,0.8),
            4px 4px 0px rgba(200,200,200,0.7),
            5px 5px 10px rgba(0,0,0,0.8),
            0 0 15px rgba(0,170,255,0.7),
            0 0 30px rgba(0,170,255,0.7),
            0 0 45px rgba(0,170,255,0.7);
        animation: textGlow 3s ease-in-out infinite alternate;
        transform: perspective(500px) rotateX(10deg);
    }

    @keyframes textGlow {
        0% {
            text-shadow:
                1px 1px 0px rgba(255,255,255,0.8),
                2px 2px 0px rgba(240,240,240,0.7),
                3px 3px 0px rgba(220,220,220,0.6),
                4px 4px 0px rgba(200,200,200,0.5),
                5px 5px 5px rgba(0,0,0,0.3),
                0 0 10px rgba(0,170,255,0.5),
                0 0 20px rgba(0,170,255,0.5),
                0 0 30px rgba(0,170,255,0.5);
        }
        100% {
            text-shadow:
                1px 1px 0px rgba(255,255,255,0.8),
                2px 2px 0px rgba(240,240,240,0.7),
                3px 3px 0px rgba(220,220,220,0.6),
                4px 4px 0px rgba(200,200,200,0.5),
                5px 5px 5px rgba(0,0,0,0.3),
                0 0 15px rgba(0,170,255,0.8),
                0 0 30px rgba(0,170,255,0.8),
                0 0 45px rgba(20,195,255,0.6);
        }
    }

    .hero h1::before {
        
        font-size: 50px;
        margin-right: 10px;
    }

    /* Floating 3D Sphere */
    .sphere {
        position: absolute;
        left: 100px;
        top: 60px;
        width: 140px;
        height: 140px;
        background: radial-gradient(circle at 30% 30%, #ffffff, #f0f0f0, #e0e0e0, #d0d0d0);
        border-radius: 50%;
        box-shadow:
            -15px -15px 25px rgba(255,255,255,0.2),
            15px 15px 40px rgba(0,0,0,0.6),
            0 0 25px rgba(0,170,255,0.6),
            inset 0 0 25px rgba(255,255,255,0.3);
        animation: float 5s ease-in-out infinite, glow 3s ease-in-out infinite alternate;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #00aaff;
        font-size: 50px;
        border: 2px solid rgba(0,170,255,0.3);
    }

    .sphere::before {
        content: "\f002"; /* Font Awesome search icon */
        font-family: "Font Awesome 6 Free";
        font-weight: 900;
        text-shadow: 0 0 10px rgba(0,170,255,0.8);
        animation: rotate 8s linear infinite;
    }

    @keyframes rotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    @keyframes glow {
        0% { box-shadow: -15px -15px 25px rgba(255,255,255,0.2), 15px 15px 40px rgba(0,0,0,0.6), 0 0 25px rgba(0,170,255,0.6), inset 0 0 25px rgba(255,255,255,0.3); }
        100% { box-shadow: -15px -15px 25px rgba(255,255,255,0.2), 15px 15px 40px rgba(0,0,0,0.6), 0 0 35px rgba(0,170,255,0.9), inset 0 0 35px rgba(255,255,255,0.4); }
    }

    @keyframes float {
        0% { transform: translateY(0px) rotate(5deg); }
        50% { transform: translateY(-20px) rotate(10deg); }
        100% { transform: translateY(0px) rotate(5deg); }
    }

    /* Main container */
    .container {
        display: flex;
        justify-content: center;
        gap: 50px;
        padding: 50px;
        flex-wrap: wrap;
    }

    /* Glass Cards */
    .card {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 20px;
        padding: 30px;
        width: 380px;
        backdrop-filter: blur(15px);
        box-shadow: 0px 10px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.1);
        transition: 0.3s ease;
    }

    .card:hover {
        transform: translateY(-8px);
        box-shadow: 0px 15px 60px rgba(0,0,0,0.6), inset 0 0 30px rgba(255,255,255,0.15);
    }

    input[type="text"] {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        outline: none;
        border: none;
        font-size: 15px;
        margin-top: 10px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
    }

    input[type="text"]::placeholder {
        color: rgba(255, 255, 255, 0.6);
    }

    .btn {
        background: linear-gradient(45deg, #00aaff, #14c3ff);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s ease;
        margin-top: 10px;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(0,170,255,0.5);
    }

    .result-line {
        font-size: 18px;
        margin: 12px 0;
    }

    .highlight {
        color: #14c3ff;
        font-weight: bold;
    }

    /* Loading Spinner */
    .spinner {
        display: none;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top: 4px solid #14c3ff;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 10px auto;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* Prediction Animations */
    .hate-speech {
        animation: shake 0.5s ease-in-out;
        border: 2px solid #ff4444 !important;
        box-shadow: 0px 10px 40px rgba(255, 68, 68, 0.5) !important;
    }

    .offensive-language {
        animation: glow 1s ease-in-out;
        border: 2px solid #ffaa00 !important;
        box-shadow: 0px 10px 40px rgba(255, 170, 0, 0.5) !important;
    }

    .neither {
        animation: fadeIn 0.8s ease-in-out;
        border: 2px solid #44ff44 !important;
        box-shadow: 0px 10px 40px rgba(68, 255, 68, 0.5) !important;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
        20%, 40%, 60%, 80% { transform: translateX(10px); }
    }

    @keyframes glow {
        0% { box-shadow: 0px 10px 40px rgba(255, 170, 0, 0.5), 0 0 20px rgba(255, 170, 0, 0.8); }
        50% { box-shadow: 0px 10px 40px rgba(255, 170, 0, 0.8), 0 0 40px rgba(255, 170, 0, 1), 0 0 60px rgba(255, 170, 0, 0.6); }
        100% { box-shadow: 0px 10px 40px rgba(255, 170, 0, 0.5), 0 0 20px rgba(255, 170, 0, 0.8); }
    }

    @keyframes fadeIn {
        0% { opacity: 0; transform: scale(0.9); }
        100% { opacity: 1; transform: scale(1); }
    }

    /* Footer */
    .footer {
        text-align: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.5);
        margin-top: 50px;
    }

    .footer a {
        color: #14c3ff;
        text-decoration: none;
        margin: 0 10px;
    }

    .footer a:hover {
        text-decoration: underline;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .hero {
            height: 200px;
        }

        .hero h1 {
            font-size: 30px;
        }

        .sphere {
            width: 120px;
            height: 120px;
            right: 20px;
            top: 40px;
        }

        .container {
            padding: 20px;
            gap: 20px;
        }

        .card {
            width: 100%;
            padding: 20px;
        }
    }

</style>
</head>
<body>

<div class="hero">
    <h1>Detect Hate Speech in Texts </h1>
    <div class="sphere"></div>
</div>

<div class="container">

    <!-- INPUT CARD -->
    <div class="card">
        <h2><i class="fas fa-edit"></i> Enter Text</h2>
        <input type="text" id="tweetInput" placeholder="Type a text...">
        <button class="btn" id="analyzeBtn">Analyze</button>
    </div>

    <!-- RESULT CARD -->
    <div class="card" id="resultCard">
        <h2><i class="fas fa-chart-bar"></i> Results</h2>
        <div id="spinner" class="spinner"></div>
        <div class="result-line"><i class="fas fa-exclamation-triangle"></i> Hate Speech Count: <span id="hate" class="highlight">0</span></div>
        <div class="result-line"><i class="fas fa-angry"></i> Offensive Count: <span id="offensive" class="highlight">0</span></div>
        <div class="result-line"><i class="fas fa-smile"></i> Neither Count: <span id="neither" class="highlight">0</span></div>
        <div class="result-line"><i class="fas fa-tag"></i> Predicted Class: <span id="predClass" class="highlight">—</span></div>
        <div class="result-line"><i class="fas fa-quote-left"></i> Text: <span id="tweetOutput" class="highlight">—</span></div>
    </div>

</div>

<!-- Footer -->
<div class="footer">
    <p>&copy; 2025 Hate Speech Detection. Built with ❤️ using FastAPI and Machine Learning.</p>
</div>

<script>
async function analyzeText() {
    const tweet = document.getElementById("tweetInput").value;

    if (!tweet.trim()) {
        return;
    }

    // Show spinner
    document.getElementById("spinner").style.display = "block";

    try {
        const response = await fetch("http://localhost:8000/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ tweet: tweet })
        });

        if (!response.ok) {
            throw new Error("Network response was not ok");
        }

        const data = await response.json();

        // Hide spinner
        document.getElementById("spinner").style.display = "none";

        if (data.error) {
            alert(data.error);
            return;
        }

        document.getElementById("hate").innerText = data.hate_speech;
        document.getElementById("offensive").innerText = data.offensive_language;
        document.getElementById("neither").innerText = data.neutral;

        const classes = ["Hate Speech", "Offensive Language", "Neither"];
        const predClassElement = document.getElementById("predClass");
        predClassElement.innerText = classes[data.class];

        // Remove previous animation classes from result card
        const resultCard = document.getElementById("resultCard");
        resultCard.classList.remove("hate-speech", "offensive-language", "neither");

        // Add appropriate animation class to result card based on prediction
        if (data.class === 0) {
            resultCard.classList.add("hate-speech");
        } else if (data.class === 1) {
            resultCard.classList.add("offensive-language");
        } else if (data.class === 2) {
            resultCard.classList.add("neither");
        }

        document.getElementById("tweetOutput").innerText = data.tweet;
    } catch (error) {
        // Hide spinner
        document.getElementById("spinner").style.display = "none";
        console.error("Error:", error);
        alert("An error occurred while analyzing the tweet. Please try again.");
    }
}

// Add event listener for button click
document.getElementById("analyzeBtn").addEventListener("click", function() {
    analyzeText();
});
</script>

</body>
</html>
